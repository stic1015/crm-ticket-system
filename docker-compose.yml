services:
  postgres:
    image: postgres:16
    container_name: crm-ticket-postgres
    environment:
      POSTGRES_DB: crm_ticket
      POSTGRES_USER: crm
      POSTGRES_PASSWORD: crm123456
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: crm-ticket-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
