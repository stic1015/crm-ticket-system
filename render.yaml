databases:
  - name: crm-ticket-db
    databaseName: crm_ticket
    user: crm
    plan: basic-1gb

services:
  - type: web
    name: crm-ticket-api
    runtime: docker
    plan: starter
    dockerContext: ./apps/server
    dockerfilePath: ./apps/server/Dockerfile
    autoDeployTrigger: commit
    healthCheckPath: /actuator/health
    envVars:
      - key: SERVER_PORT
        value: "10000"
      - key: DATABASE_URL
        fromDatabase:
          name: crm-ticket-db
          property: connectionString
      - key: APP_SECURITY_ALLOWED_ORIGINS
        sync: false
